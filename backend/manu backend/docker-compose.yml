version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: slosh_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slosh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slosh_password}
      POSTGRES_DB: ${POSTGRES_DB:-slosh_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slosh_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slosh_network

  web:
    build: .
    container_name: slosh_api
    command: python run.py
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_APP: run.py
      DATABASE_URL: postgresql://${POSTGRES_USER:-slosh_user}:${POSTGRES_PASSWORD:-slosh_password}@db:5432/${POSTGRES_DB:-slosh_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - slosh_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  slosh_network:
    driver: bridge
