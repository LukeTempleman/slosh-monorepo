version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gonxt_postgres
    environment:
      POSTGRES_USER: gonxt_user
      POSTGRES_PASSWORD: gonxt_password
      POSTGRES_DB: gonxt_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonxt_user -d gonxt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gonxt_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gonxt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gonxt.local
      PGADMIN_DEFAULT_PASSWORD: admin@123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gonxt_network

  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gonxt_flask
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "True"
      DATABASE_URL: postgresql://gonxt_user:gonxt_password@postgres:5432/gonxt_db
      JWT_SECRET_KEY: your-jwt-secret-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: python run.py
    networks:
      - gonxt_network

volumes:
  postgres_data:

networks:
  gonxt_network:
    driver: bridge
